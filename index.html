                <g transform="rotate(333 60 60)"><ellipse cx="60" cy="47" rx="10" ry="15.5" fill="url(#pMid)" stroke="#3a0510" stroke-width="0.6" stroke-opacity="0.35"/></g>
                <!-- inner petal ring (5) -->
                <g transform="rotate(18 60 60)"><ellipse cx="60" cy="52" rx="7.5" ry="11.5" fill="url(#pInner)"/></g>

                  <path d="M60,67 A7,7 0 1 1 67,60"/>
                  <path d="M67,60 A5,5 0 1 0 56.5,59.5"/>
                </g>
                <circle cx="60.5" cy="60.5" r="2.2" fill="#280308"/>

            </svg>
